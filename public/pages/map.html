<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>地図 - 自治会DAO</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  body { overflow: hidden; }
  #map-container { position: relative; }
  #map { width: 100%; height: calc(100dvh - 57px - 44px - var(--tab-h) - var(--safe-bottom)); }
  .map-fab {
    position: fixed; right: 16px;
    bottom: calc(var(--tab-h) + var(--safe-bottom) + 16px);
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--primary); color: #fff; font-size: 28px;
    border: none; cursor: pointer; box-shadow: 0 4px 12px rgba(37,99,235,.4);
    display: flex; align-items: center; justify-content: center; z-index: 80;
  }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <h1>🗺️ 地図</h1>
  <span id="user-badge" style="font-size:13px;color:#6b7280;"></span>
</div>

<!-- 仮登録・承認待ちバナー -->
<div id="register-banner" style="display:none;background:#fef3c7;border-bottom:1px solid #fcd34d;padding:10px 16px;align-items:center;justify-content:space-between;gap:8px;">
  <span id="banner-msg" style="font-size:13px;color:#92400e;"></span>
  <a id="banner-btn" href="/pages/register" class="btn btn-sm" style="background:#f59e0b;color:#fff;white-space:nowrap;min-height:32px;padding:4px 12px;">申請する</a>
</div>

<!-- カテゴリフィルタ -->
<div class="category-filter" id="cat-filter">
  <button class="cat-btn active-all" data-cat="all" onclick="filterCat(this,'all')">すべて</button>
  <button class="cat-btn" data-cat="road" onclick="filterCat(this,'road')">🚧 道路</button>
  <button class="cat-btn" data-cat="safe" onclick="filterCat(this,'safe')">🚨 安全</button>
  <button class="cat-btn" data-cat="env"  onclick="filterCat(this,'env')">🌿 環境</button>
  <button class="cat-btn" data-cat="other" onclick="filterCat(this,'other')">📌 その他</button>
</div>

<!-- 地図コントロール -->
<div class="map-controls" style="padding:6px 12px;">
  <button id="earth-btn" title="衛星写真切替" onclick="toggleEarth()">🌍</button>
  <button id="locate-btn" title="現在地" onclick="locateMe()">📍</button>
</div>

<!-- Google Maps -->
<div id="map-container">
  <div id="map"></div>
</div>

<!-- ボトムシート（ピン詳細） -->
<div class="bottom-sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-body" id="sheet-body"></div>
</div>
<div id="sheet-backdrop" onclick="closeSheet()"
  style="display:none;position:fixed;inset:0;z-index:89;background:rgba(0,0,0,.2);"></div>

<!-- 投稿FABボタン -->
<button class="map-fab" onclick="window.location.href='/pages/post'">＋</button>

<!-- タブバー -->
<nav class="tab-bar">
  <a class="tab-item" href="/"><span class="icon">🏠</span>お知らせ</a>
  <a class="tab-item active" href="/pages/map"><span class="icon">🗺️</span>地図</a>
  <a class="tab-item" href="/pages/proposals"><span class="icon">📋</span>議題</a>
  <a class="tab-item" href="/pages/post"><span class="icon">✏️</span>投稿</a>
  <a class="tab-item" href="/pages/schedule"><span class="icon">📅</span>予定</a>
  <a class="tab-item" href="/pages/mypage"><span class="icon">👤</span>My</a>
</nav>

<div id="toast" class="toast"></div>

<script src="/js/common.js"></script>
<script>
  let map, markers = [], isEarth = false, currentCat = 'all';
  let posts = [];

  async function initApp() {
    const user = await fetchCurrentUserOptional();
    if (!user) { window.location.href = '/pages/login'; return; }

    document.getElementById('user-badge').textContent =
      (user.name || 'ゲスト') + '（' + (USER_STATUS_LABELS[user.status] || user.status) + '）';

    const banner = document.getElementById('register-banner');
    const bannerMsg = document.getElementById('banner-msg');
    const bannerBtn = document.getElementById('banner-btn');
    if (user.status === 'provisional') {
      banner.style.display = 'flex';
      bannerMsg.textContent = '📝 本登録申請をするとコメント・投票ができます';
      bannerBtn.style.display = 'inline-flex';
    } else if (user.status === 'pending_review') {
      banner.style.display = 'flex';
      bannerMsg.textContent = '⏳ 本登録申請中です。管理者の承認をお待ちください';
      bannerBtn.style.display = 'none';
    }

    if (['admin', 'officer'].includes(user.status)) {
      const adminLink = document.createElement('a');
      adminLink.href = '/pages/admin';
      adminLink.innerHTML = '⚙️ 管理';
      adminLink.style.cssText = 'font-size:13px;font-weight:600;text-decoration:none;background:#f3f4f6;border-radius:8px;padding:4px 10px;margin-left:8px;color:#374151;';
      document.querySelector('.header').appendChild(adminLink);
    }
  }

  window.initMap = async function() {
    await initApp();

    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 35.5035, lng: 139.3177 },
      zoom: 15,
      disableDefaultUI: true,
      zoomControl: true,
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: false
    });

    map.addListener('click', closeSheet);
    await loadPosts();
  };

  async function loadPosts(cat) {
    const url = '/api/map/posts' + (cat && cat !== 'all' ? `?category=${cat}` : '');
    const res = await fetch(url);
    posts = await res.json();
    renderMarkers(posts);
  }

  const PIN_COLORS = { '最重要': '#dc2626', '重要': '#ea580c', '警戒': '#ca8a04', '様子見': '#2563eb' };

  function renderMarkers(data) {
    markers.forEach(m => m.setMap(null));
    markers = [];

    data.forEach(post => {
      const color = PIN_COLORS[post.priority] || '#2563eb';
      const marker = new google.maps.Marker({
        position: { lat: post.lat, lng: post.lng },
        map,
        title: post.title,
        label: {
          text: post.title.length > 8 ? post.title.slice(0, 8) + '…' : post.title,
          color: '#fff',
          fontSize: '11px',
          fontWeight: 'bold'
        },
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 18,
          fillColor: color,
          fillOpacity: 1,
          strokeColor: '#fff',
          strokeWeight: 2
        }
      });
      marker.addListener('click', () => openSheet(post.id));
      markers.push(marker);
    });
  }

  function filterCat(el, cat) {
    currentCat = cat;
    document.querySelectorAll('.cat-btn').forEach(b => { b.className = 'cat-btn'; });
    el.classList.add('active-' + (cat === 'all' ? 'all' : cat));
    loadPosts(cat);
  }

  function toggleEarth() {
    isEarth = !isEarth;
    map.setMapTypeId(isEarth ? 'satellite' : 'roadmap');
    document.getElementById('earth-btn').textContent = isEarth ? '🗺️' : '🌍';
  }

  function locateMe() {
    if (!navigator.geolocation) { showToast('位置情報が使えません'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      const latlng = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      map.setCenter(latlng);
      map.setZoom(17);
    }, () => showToast('位置情報を取得できませんでした'));
  }

  async function openSheet(postId) {
    const res = await fetch(`/api/map/posts/${postId}`);
    const post = await res.json();

    const catLabel = CATEGORY_LABELS[post.category] || post.category;
    const photoHtml = post.photo_url
      ? `<img src="${post.photo_url}" class="post-photo" alt="写真">`
      : '';

    const PRIORITY_STYLE = {
      '最重要': 'background:#fee2e2;color:#dc2626;',
      '重要':   'background:#ffedd5;color:#ea580c;',
      '警戒':   'background:#fef9c3;color:#ca8a04;',
      '様子見': 'background:#eff6ff;color:#2563eb;',
    };
    const priorityStyle = PRIORITY_STYLE[post.priority] || PRIORITY_STYLE['様子見'];
    const priorityBadge = `<span style="font-size:12px;font-weight:700;padding:3px 10px;border-radius:10px;${priorityStyle}">${post.priority||'様子見'}</span>`;

    const viewBtn = currentUser ? `
      <button id="view-btn-${post.id}"
        onclick="markView(${post.id})" ${post.myView ? 'disabled' : ''}
        style="width:100%;margin:10px 0;padding:14px;border-radius:14px;border:none;cursor:${post.myView?'default':'pointer'};font-size:16px;font-weight:700;letter-spacing:.5px;
          ${post.myView
            ? 'background:#f0fdf4;color:#16a34a;box-shadow:inset 0 0 0 2px #86efac;'
            : 'background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 4px 14px rgba(37,99,235,.4);'}">
        ${post.myView ? '✅ 確認済み' : '👁 この情報を確認しました'}
        <div style="font-size:12px;font-weight:400;margin-top:2px;opacity:.8;" id="view-count-${post.id}">${post.viewCount}人が確認済み</div>
      </button>` : `
      <div style="text-align:center;font-size:13px;color:#9ca3af;margin:8px 0;padding:10px;background:#f9fafb;border-radius:10px;">👁 ${post.viewCount}人が確認済み</div>`;

    let optionsHtml = '';
    const isApproved = currentUser && ['approved','officer','admin'].includes(currentUser.status);
    if (post.options && post.options.length > 0) {
      const optBtns = post.options.map(opt => {
        const selected = post.myOptionVote === opt.id;
        return `<button class="btn btn-sm" style="margin:3px;${selected?'background:#2563eb;color:#fff;':'background:#f3f4f6;color:#374151;'}"
          ${isApproved ? `onclick="voteOption(${post.id},${opt.id})"` : 'disabled'}
          id="opt-btn-${opt.id}">
          ${escHtml(opt.label)} <strong id="opt-count-${opt.id}">${opt.vote_count}</strong>票
        </button>`;
      }).join('');
      optionsHtml = `
        <div style="margin:8px 0;">
          <div style="font-size:13px;font-weight:600;margin-bottom:6px;">📊 アンケート</div>
          <div id="options-row-${post.id}">${optBtns}</div>
          ${!isApproved ? `<div style="font-size:12px;color:#9ca3af;margin-top:4px;">${!currentUser?'（ログインで投票）':'（承認後に投票可）'}</div>` : ''}
        </div>`;
    }
    const voteHtml = viewBtn + optionsHtml;

    const statusOptions = currentUser && ['officer','admin'].includes(currentUser.status) ? `
      <select id="status-sel-${post.id}" class="form-select" style="margin-bottom:8px;"
        onchange="updateStatus(${post.id})">
        <option value="open"        ${post.status==='open'?'selected':''}>⚠️ 未対応</option>
        <option value="in_progress" ${post.status==='in_progress'?'selected':''}>🔧 対応中</option>
        <option value="resolved"    ${post.status==='resolved'?'selected':''}>✅ 解決済</option>
      </select>` : statusBadge(post.status);

    const commentsHtml = post.comments.map(c => `
      <div class="comment-item">
        <div class="comment-user">${c.user_name}</div>
        <div class="comment-text">${escHtml(c.content)}</div>
        <div class="comment-time">${formatDate(c.created_at)}</div>
      </div>`).join('');

    const commentForm = currentUser ? `
      <div class="comment-form">
        <input type="text" id="comment-input-${post.id}" placeholder="コメントを入力…">
        <button class="btn btn-primary btn-sm" onclick="addComment(${post.id})">送信</button>
      </div>` : '';

    const canEdit = currentUser && (currentUser.id === post.user_id || ['officer','admin'].includes(currentUser.status));
    const editBtn = canEdit ? `<button class="btn btn-secondary btn-sm" style="margin-left:auto;" onclick="editPost(${post.id})">✏️ 編集</button>` : '';

    document.getElementById('sheet-body').innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;">
        <h2 style="font-size:18px;font-weight:700;flex:1;margin:0;">${escHtml(post.title)}</h2>
        ${editBtn}
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;">
        ${categoryBadge(post.category)}
        ${priorityBadge}
        ${statusOptions}
      </div>
      ${photoHtml}
      <p style="font-size:15px;line-height:1.6;color:#374151;margin-bottom:8px;">${escHtml(post.content || '')}</p>
      <div style="font-size:12px;color:#9ca3af;margin-bottom:12px;">
        👤 ${post.user_name}　🕐 ${formatDate(post.created_at)}
      </div>
      ${voteHtml}
      <hr style="border:none;border-top:1px solid #f3f4f6;margin:12px 0;">
      <div style="font-weight:700;margin-bottom:8px;">コメント（${post.comments.length}件）</div>
      <div id="comments-${post.id}">${commentsHtml}</div>
      ${commentForm}
    `;

    document.getElementById('sheet').classList.add('open');
    document.getElementById('sheet-backdrop').style.display = 'block';
  }

  function closeSheet() {
    document.getElementById('sheet').classList.remove('open');
    document.getElementById('sheet-backdrop').style.display = 'none';
  }

  async function markView(postId) {
    const res = await fetch(`/api/map/posts/${postId}/view`, { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      const btn = document.getElementById(`view-btn-${postId}`);
      if (btn) {
        btn.innerHTML = `✅ 確認済み<div style="font-size:12px;font-weight:400;margin-top:2px;opacity:.8;">${data.viewCount}人が確認済み</div>`;
        btn.style.cssText = 'width:100%;margin:10px 0;padding:14px;border-radius:14px;border:none;font-size:16px;font-weight:700;background:#f0fdf4;color:#16a34a;box-shadow:inset 0 0 0 2px #86efac;';
        btn.disabled = true;
      }
      showToast('閲覧済みにしました！ +1pt');
    }
  }

  async function voteOption(postId, optionId) {
    const res = await fetch(`/api/map/posts/${postId}/option-vote`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ option_id: optionId })
    });
    const data = await res.json();
    if (data.success) {
      data.options.forEach(opt => {
        const btn = document.getElementById(`opt-btn-${opt.id}`);
        const cnt = document.getElementById(`opt-count-${opt.id}`);
        if (cnt) cnt.textContent = opt.vote_count;
        if (btn) {
          const selected = data.myOptionVote === opt.id;
          btn.style.background = selected ? '#2563eb' : '#f3f4f6';
          btn.style.color = selected ? '#fff' : '#374151';
        }
      });
      showToast(data.myOptionVote ? '投票しました！ +1pt' : '投票を取り消しました');
    } else {
      showToast(data.error);
    }
  }

  async function addComment(postId) {
    const inp = document.getElementById(`comment-input-${postId}`);
    const content = inp.value.trim();
    if (!content) return;

    const res = await fetch(`/api/map/posts/${postId}/comments`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    const data = await res.json();
    if (data.success) {
      inp.value = '';
      showToast('コメントしました！ +2pt');
      openSheet(postId);
    } else {
      showToast(data.error);
    }
  }

  async function updateStatus(postId) {
    const status = document.getElementById(`status-sel-${postId}`).value;
    const res = await fetch(`/api/map/posts/${postId}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    const data = await res.json();
    if (data.success) {
      showToast('状態を更新しました');
      loadPosts(currentCat);
    } else {
      showToast(data.error);
    }
  }

  async function editPost(postId) {
    const res = await fetch(`/api/map/posts/${postId}`);
    const post = await res.json();

    const photoSection = post.photo_url ? `
      <div class="form-group">
        <label class="form-label">現在の写真</label>
        <div style="position:relative;display:inline-block;">
          <img id="edit-photo-preview" src="${post.photo_url}" style="width:100%;border-radius:10px;display:block;" alt="現在の写真">
          <button type="button" onclick="removeEditPhoto()"
            style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;">✕</button>
        </div>
        <input type="hidden" id="edit-remove-photo" value="0">
      </div>
      <div class="form-group" id="edit-new-photo-group" style="display:none;">
        <label class="form-label">新しい写真に変更</label>
        <input type="file" id="edit-photo" accept="image/*" capture="environment" onchange="previewEditPhoto(this)">
        <img id="edit-new-preview" style="width:100%;border-radius:10px;margin-top:8px;display:none;">
      </div>` : `
      <div class="form-group">
        <label class="form-label">写真を追加（任意）</label>
        <input type="file" id="edit-photo" accept="image/*" capture="environment" onchange="previewEditPhoto(this)">
        <img id="edit-new-preview" style="width:100%;border-radius:10px;margin-top:8px;display:none;">
        <input type="hidden" id="edit-remove-photo" value="0">
      </div>`;

    const modal = document.createElement('div');
    modal.id = 'edit-modal';
    modal.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;';
    modal.innerHTML = `
      <div style="background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px 40px;">
        <div style="font-weight:700;font-size:17px;margin-bottom:16px;">✏️ 投稿を編集</div>
        <div class="form-group">
          <label class="form-label">タイトル</label>
          <input id="edit-title" class="form-input" value="${escHtml(post.title)}">
        </div>
        <div class="form-group">
          <label class="form-label">カテゴリ</label>
          <select id="edit-category" class="form-select">
            <option value="road"  ${post.category==='road' ?'selected':''}>🚧 道路・インフラ</option>
            <option value="safe"  ${post.category==='safe' ?'selected':''}>🚨 安全・防犯</option>
            <option value="env"   ${post.category==='env'  ?'selected':''}>🌿 環境・清掃</option>
            <option value="other" ${post.category==='other'?'selected':''}>📌 その他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">重要度</label>
          <select id="edit-priority" class="form-select">
            <option value="最重要" ${post.priority==='最重要'?'selected':''}>🔴 最重要</option>
            <option value="重要"   ${post.priority==='重要'  ?'selected':''}>🟠 重要</option>
            <option value="警戒"   ${post.priority==='警戒'  ?'selected':''}>🟡 警戒</option>
            <option value="様子見" ${post.priority==='様子見'?'selected':''}>🔵 様子見</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">詳細内容</label>
          <textarea id="edit-content" class="form-textarea">${escHtml(post.content || '')}</textarea>
        </div>
        ${photoSection}
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn btn-secondary btn-block" onclick="document.getElementById('edit-modal').remove()">キャンセル</button>
          <button class="btn btn-primary btn-block" onclick="savePost(${postId})">保存</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
  }

  function removeEditPhoto() {
    document.getElementById('edit-remove-photo').value = '1';
    document.getElementById('edit-photo-preview').closest('div').style.display = 'none';
    const newGroup = document.getElementById('edit-new-photo-group');
    if (newGroup) newGroup.style.display = 'block';
  }

  function previewEditPhoto(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById('edit-new-preview');
      img.src = e.target.result;
      img.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  async function savePost(postId) {
    const title = document.getElementById('edit-title').value.trim();
    if (!title) { showToast('タイトルを入力してください'); return; }

    const form = new FormData();
    form.append('title',        title);
    form.append('content',      document.getElementById('edit-content').value);
    form.append('category',     document.getElementById('edit-category').value);
    form.append('priority',     document.getElementById('edit-priority').value);
    form.append('remove_photo', document.getElementById('edit-remove-photo')?.value || '0');
    const photoFile = document.getElementById('edit-photo')?.files[0];
    if (photoFile) form.append('photo', photoFile);

    const res = await fetch(`/api/map/posts/${postId}`, { method: 'PUT', body: form });
    const data = await res.json();
    if (data.success) {
      document.getElementById('edit-modal').remove();
      showToast('更新しました');
      openSheet(postId);
      loadPosts(currentCat);
    } else {
      showToast(data.error);
    }
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

<script>
  fetch('/api/auth/me').then(() => {
    const script = document.createElement('script');
    const key = 'AIzaSyAkhEJzsTLr4KyeHj5VQ3N1qoBNAS9aQ2s';
    script.src = `https://maps.googleapis.com/maps/api/js?key=${key}&callback=initMap&language=ja`;
    script.async = true;
    document.head.appendChild(script);
  });
</script>
</body>
