<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ログイン - 自治会DAO</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .step-box {
    background: #f0f9ff; border: 1.5px solid #bae6fd;
    border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
    font-size: 14px; line-height: 1.8; color: #0369a1;
  }
  .step-box strong { color: #0c4a6e; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">🏘️</div>
  <h1 class="login-title">自治会DAO</h1>
  <p class="login-sub">地域の問題を一緒に解決しよう</p>

  <div id="login-content" style="width:100%;max-width:360px;display:none;">

    <div class="step-box">
      <strong>📋 はじめての方へ</strong><br>
      ① ニックネームを入力してログイン<br>
      ② 住所・電話番号を登録して申請<br>
      ③ 管理者が承認したら正会員に！
    </div>

    <div class="card" style="margin:0 0 16px;">
      <div class="form-group">
        <label class="form-label">ニックネーム <span style="color:#ef4444;">*</span></label>
        <input type="text" id="nickname" class="form-input" placeholder="例：たろう、田中">
      </div>
      <div class="form-group" id="password-group" style="display:none;">
        <label class="form-label">パスワード <span style="color:#ef4444;">*</span></label>
        <input type="password" id="password" class="form-input" placeholder="パスワードを入力">
      </div>
      <button class="btn btn-primary btn-block" onclick="doLogin()">ログイン / はじめる</button>
    </div>

  </div>
</div>

<div id="toast" class="toast"></div>
<script src="/js/common.js"></script>
<script>
  fetch('/api/auth/me').then(r => r.json()).then(d => {
    if (d.loggedIn) {
      window.location.href = '/';
    } else {
      document.getElementById('login-content').style.display = 'block';
    }
  });

  let needsPassword = false;

  async function doLogin() {
    const nickname = document.getElementById('nickname').value.trim();
    if (!nickname) { showToast('ニックネームを入力してください'); return; }

    const password = needsPassword ? document.getElementById('password').value : undefined;
    if (needsPassword && !password) { showToast('パスワードを入力してください'); return; }

    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname, password })
    });
    const data = await res.json();

    if (data.requiresPassword) {
      needsPassword = true;
      document.getElementById('password-group').style.display = 'block';
      document.getElementById('password').focus();
      showToast('パスワードを入力してください');
      return;
    }
    if (data.success) {
      window.location.href = '/';
    } else {
      showToast(data.error || 'ログイン失敗');
    }
  }

  // Enterキー対応
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
