<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>履歴 - 自治会DAO</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="header">
  <h1>📜 投稿履歴</h1>
</div>

<div class="page" id="list-container">
  <div class="loading">読み込み中…</div>
</div>

<!-- タブバー -->
<nav class="tab-bar">
  <a class="tab-item" href="/"><span class="icon">🏠</span>お知らせ</a>
  <a class="tab-item" href="/pages/map"><span class="icon">🗺️</span>地図</a>
  <a class="tab-item" href="/pages/proposals"><span class="icon">📋</span>議題</a>
  <a class="tab-item" href="/pages/post"><span class="icon">✏️</span>投稿</a>
  <a class="tab-item" href="/pages/schedule"><span class="icon">📅</span>予定</a>
  <a class="tab-item" href="/pages/mypage"><span class="icon">👤</span>My</a>
</nav>

<div id="toast" class="toast"></div>
<script src="/js/common.js"></script>
<script>
  async function init() {
    await fetchCurrentUser();
    const res  = await fetch('/api/map/posts');
    const all  = await res.json();
    const mine = all.filter(p => p.user_id === currentUser.id);
    const container = document.getElementById('list-container');

    if (mine.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <div class="icon">📌</div>
          <p>まだ投稿がありません</p>
          <a href="/pages/post" class="btn btn-primary btn-sm" style="margin-top:12px;">最初の投稿をする</a>
        </div>`;
      return;
    }

    container.innerHTML = mine.map(p => `
      <div class="card" style="cursor:pointer;" onclick="openPost(${p.id})">
        <div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:6px;">
          ${p.photo_url ? `<img src="${p.photo_url}" style="width:60px;height:60px;object-fit:cover;border-radius:8px;">` : ''}
          <div style="flex:1;">
            <div style="font-weight:700;font-size:15px;">${escHtml(p.title)}</div>
            <div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap;">
              ${categoryBadge(p.category)}
              ${statusBadge(p.status)}
            </div>
          </div>
        </div>
        <div style="font-size:12px;color:#6b7280;display:flex;gap:12px;">
          <span>👍 ${p.agree_count} / 👎 ${p.disagree_count}</span>
          <span>💬 ${p.comment_count}</span>
          <span>🕐 ${formatDate(p.created_at)}</span>
        </div>
      </div>`).join('');
  }

  function openPost(id) {
    // 地図トップを開いてそのピンを選択（シンプルにトップへ遷移）
    window.location.href = `/?post=${id}`;
  }

  function escHtml(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
</body>
</html>
