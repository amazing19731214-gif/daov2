<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>在庫管理表 - 自治会DAO</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .inv-table { width:100%; border-collapse:collapse; font-size:13px; }
  .inv-table th { background:#f3f4f6; padding:8px 10px; text-align:left; font-size:12px; color:#6b7280; font-weight:600; border-bottom:2px solid #e5e7eb; }
  .inv-table td { padding:10px; border-bottom:1px solid #f3f4f6; vertical-align:middle; }
  .inv-table tr:last-child td { border-bottom:none; }
  .qty-badge { display:inline-block; padding:2px 8px; border-radius:99px; font-weight:700; font-size:13px; }
  .qty-ok { background:#dcfce7; color:#16a34a; }
  .qty-low { background:#fef9c3; color:#a16207; }
  .qty-zero { background:#fee2e2; color:#dc2626; }
</style>
</head>
<body>

<div class="header">
  <a href="/" class="back-btn">←</a>
  <h1>📦 在庫管理表</h1>
</div>

<div id="page-body" style="padding-bottom:80px;">
  <div class="loading" style="padding:40px;text-align:center;">読み込み中…</div>
</div>

<nav class="tab-bar">
  <a class="tab-item" href="/"><span class="icon">🏠</span>お知らせ</a>
  <a class="tab-item" href="/pages/map"><span class="icon">🗺️</span>地図</a>
  <a class="tab-item" href="/pages/proposals"><span class="icon">📋</span>議題</a>
  <a class="tab-item" href="/pages/post"><span class="icon">✏️</span>投稿</a>
  <a class="tab-item" href="/pages/schedule"><span class="icon">📅</span>予定</a>
  <a class="tab-item" href="/pages/mypage"><span class="icon">👤</span>My</a>
</nav>

<div id="toast" class="toast"></div>
<script src="/js/common.js"></script>
<script>
  let _items = [];
  let _user = null;
  let _canEdit = false;

  function escHtml(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
  }

  async function init() {
    _user = await fetchCurrentUser().catch(() => null);
    _canEdit = _user && ['admin','officer'].includes(_user.status);

    const res = await fetch('/api/inventory');
    _items = await res.json();
    render();
  }

  function qtyClass(q) {
    if (q === 0) return 'qty-zero';
    if (q <= 3) return 'qty-low';
    return 'qty-ok';
  }

  function render() {
    const groups = {};
    _items.forEach(it => {
      if (!groups[it.category]) groups[it.category] = [];
      groups[it.category].push(it);
    });

    let html = '';

    if (_canEdit) {
      html += `
        <div style="padding:12px 16px 0;">
          <button class="btn btn-primary btn-sm" onclick="addItem()">＋ 品目を追加</button>
        </div>`;
    }

    if (_items.length === 0) {
      html += `<div style="text-align:center;padding:60px 0;color:#9ca3af;">
        <div style="font-size:40px;margin-bottom:8px;">📦</div>
        <div>在庫データがありません</div>
      </div>`;
    }

    Object.keys(groups).sort().forEach(cat => {
      html += `
        <div style="padding:14px 16px 4px;">
          <div style="font-size:12px;font-weight:700;color:#2563eb;">${escHtml(cat)}</div>
        </div>
        <div style="overflow-x:auto;padding:0 16px;">
          <table class="inv-table">
            <thead><tr>
              <th>品名</th>
              <th style="text-align:center;">数量</th>
              <th>保管場所</th>
              ${_canEdit ? '<th></th>' : ''}
            </tr></thead>
            <tbody>
              ${groups[cat].map(it => `
                <tr>
                  <td>
                    <div style="font-weight:600;">${escHtml(it.name)}</div>
                    ${it.notes ? `<div style="font-size:11px;color:#9ca3af;">${escHtml(it.notes)}</div>` : ''}
                  </td>
                  <td style="text-align:center;">
                    <span class="qty-badge ${qtyClass(it.quantity)}">${it.quantity} ${escHtml(it.unit)}</span>
                  </td>
                  <td style="font-size:12px;color:#6b7280;">${escHtml(it.location||'－')}</td>
                  ${_canEdit ? `
                    <td style="white-space:nowrap;">
                      <button class="btn btn-secondary btn-sm" style="padding:4px 8px;" onclick="editItem(${it.id})">✏️</button>
                      <button class="btn btn-danger btn-sm" style="padding:4px 8px;" onclick="deleteItem(${it.id},'${escHtml(it.name)}')">🗑</button>
                    </td>` : ''}
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    });

    if (_items.length > 0) {
      const updated = _items.reduce((a, b) => (a.updated_at > b.updated_at ? a : b));
      html += `<div style="padding:12px 16px;font-size:11px;color:#9ca3af;">最終更新: ${formatDate(updated.updated_at)} ${updated.updated_by_name ? '(' + escHtml(updated.updated_by_name) + ')' : ''}</div>`;
    }

    document.getElementById('page-body').innerHTML = html;
  }

  const CATS = ['防災備品','消防設備','衛生・救急','備蓄食料','清掃用品','その他'];

  function itemForm(it = {}) {
    return `
      <div style="display:grid;gap:10px;">
        <div>
          <label style="font-size:12px;font-weight:600;">カテゴリ</label>
          <select id="if-cat" class="form-select" style="margin-top:4px;">
            ${CATS.map(c => `<option ${it.category===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;">品名 *</label>
          <input id="if-name" class="form-input" style="margin-top:4px;" value="${escHtml(it.name||'')}">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div>
            <label style="font-size:12px;font-weight:600;">数量</label>
            <input id="if-qty" class="form-input" type="number" min="0" style="margin-top:4px;" value="${it.quantity||0}">
          </div>
          <div>
            <label style="font-size:12px;font-weight:600;">単位</label>
            <input id="if-unit" class="form-input" style="margin-top:4px;" value="${escHtml(it.unit||'個')}">
          </div>
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;">保管場所</label>
          <input id="if-loc" class="form-input" style="margin-top:4px;" value="${escHtml(it.location||'')}">
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;">備考</label>
          <input id="if-notes" class="form-input" style="margin-top:4px;" value="${escHtml(it.notes||'')}">
        </div>
      </div>`;
  }

  function showModal(title, bodyHtml, onSave) {
    const existing = document.getElementById('edit-modal');
    if (existing) existing.remove();
    const modal = document.createElement('div');
    modal.id = 'edit-modal';
    modal.style.cssText = 'position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;';
    modal.innerHTML = `
      <div style="background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px 40px;">
        <div style="font-weight:700;font-size:17px;margin-bottom:16px;">${title}</div>
        ${bodyHtml}
        <div style="display:flex;gap:8px;margin-top:16px;">
          <button class="btn btn-secondary btn-block" onclick="document.getElementById('edit-modal').remove()">キャンセル</button>
          <button class="btn btn-primary btn-block" id="modal-save-btn">保存</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    document.getElementById('modal-save-btn').onclick = onSave;
  }

  function addItem() {
    showModal('品目を追加', itemForm(), async () => {
      const body = {
        category: document.getElementById('if-cat').value,
        name:     document.getElementById('if-name').value.trim(),
        quantity: parseInt(document.getElementById('if-qty').value) || 0,
        unit:     document.getElementById('if-unit').value.trim() || '個',
        location: document.getElementById('if-loc').value.trim(),
        notes:    document.getElementById('if-notes').value.trim(),
      };
      if (!body.name) { showToast('品名は必須です'); return; }
      const res = await fetch('/api/inventory', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('edit-modal').remove();
        showToast('追加しました');
        _items = await (await fetch('/api/inventory')).json();
        render();
      } else showToast(data.error);
    });
  }

  function editItem(id) {
    const it = _items.find(i => i.id === id);
    if (!it) return;
    showModal('在庫を編集', itemForm(it), async () => {
      const body = {
        category: document.getElementById('if-cat').value,
        name:     document.getElementById('if-name').value.trim(),
        quantity: parseInt(document.getElementById('if-qty').value) || 0,
        unit:     document.getElementById('if-unit').value.trim() || '個',
        location: document.getElementById('if-loc').value.trim(),
        notes:    document.getElementById('if-notes').value.trim(),
      };
      if (!body.name) { showToast('品名は必須です'); return; }
      const res = await fetch(`/api/inventory/${id}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('edit-modal').remove();
        showToast('更新しました');
        _items = await (await fetch('/api/inventory')).json();
        render();
      } else showToast(data.error);
    });
  }

  async function deleteItem(id, name) {
    if (!confirm(`「${name}」を削除しますか？`)) return;
    const res = await fetch(`/api/inventory/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      _items = _items.filter(i => i.id !== id);
      render();
      showToast('削除しました');
    } else showToast(data.error);
  }

  init();
</script>
</body>
</html>
