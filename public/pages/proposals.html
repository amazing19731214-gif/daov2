<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>議題 - 自治会DAO</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .filter-tabs {
    display: flex; overflow-x: auto; gap: 6px;
    padding: 10px 12px; background: #fff;
    border-bottom: 1px solid #e5e7eb;
    scrollbar-width: none;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tab {
    flex-shrink: 0; padding: 5px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: 1.5px solid #e5e7eb; background: #fff; color: #6b7280;
  }
  .filter-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  .proposal-card {
    display: flex; border-radius: 12px; margin-bottom: 10px;
    overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    text-decoration: none; color: inherit;
  }
  .proposal-bar { width: 5px; flex-shrink: 0; }
  .proposal-body { padding: 12px 14px; flex: 1; min-width: 0; }
  .proposal-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
  .proposal-meta { font-size: 12px; color: #9ca3af; display: flex; gap: 10px; flex-wrap: wrap; }
  .status-badge {
    display: inline-flex; align-items: center;
    font-size: 11px; font-weight: 700;
    padding: 2px 9px; border-radius: 10px;
    margin-bottom: 6px;
  }
  .vote-bar-wrap { margin-top: 8px; }
  .vote-bar-track {
    height: 5px; border-radius: 99px; background: #f3f4f6; overflow: hidden;
  }
  .vote-bar-fill { height: 100%; border-radius: 99px; }
  .vote-counts { display: flex; justify-content: space-between; font-size: 11px; color: #9ca3af; margin-top: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1>📋 議題一覧</h1>
  <button class="btn btn-primary btn-sm" id="new-btn" style="display:none;"
    onclick="window.location.href='/pages/proposal-new'">＋ 新規</button>
</div>

<div class="filter-tabs" id="filter-tabs">
  <button class="filter-tab active" onclick="setFilter('all', this)">すべて</button>
  <button class="filter-tab" onclick="setFilter('voting', this)">🗳️ 投票中</button>
  <button class="filter-tab" onclick="setFilter('scheduled', this)">📅 投票予定</button>
  <button class="filter-tab" onclick="setFilter('open', this)">💬 議論中</button>
  <button class="filter-tab" onclick="setFilter('ended', this)">✅ 終了</button>
</div>

<div class="page" style="padding:12px 16px 0;" id="list-container">
  <div class="loading">読み込み中…</div>
</div>

<!-- タブバー -->
<nav class="tab-bar">
  <a class="tab-item" href="/"><span class="icon">🏠</span>お知らせ</a>
  <a class="tab-item" href="/pages/map"><span class="icon">🗺️</span>地図</a>
  <a class="tab-item active" href="/pages/proposals"><span class="icon">📋</span>議題</a>
  <a class="tab-item" href="/pages/post"><span class="icon">✏️</span>投稿</a>
  <a class="tab-item" href="/pages/schedule"><span class="icon">📅</span>予定</a>
  <a class="tab-item" href="/pages/mypage"><span class="icon">👤</span>My</a>
</nav>

<div id="toast" class="toast"></div>
<script src="/js/common.js"></script>
<script>
  let allProposals = [];
  let currentFilter = 'all';
  const now = new Date();

  // 状態ごとの色定義
  const STATE_COLOR = {
    voting:    '#2563eb',  // 投票中 → 青
    scheduled: '#f97316',  // 投票予定 → オレンジ
    open:      '#8b5cf6',  // 議論中 → 紫
    ended:     '#9ca3af',  // 終了 → グレー
  };
  const STATE_BG = {
    voting:    '#eff6ff',
    scheduled: '#fff7ed',
    open:      '#f5f3ff',
    ended:     '#f9fafb',
  };
  const STATE_LABEL = {
    voting:    '🗳️ 投票中',
    scheduled: '📅 投票予定',
    open:      '💬 議論中',
    ended:     '✅ 終了',
  };

  function getState(p) {
    if (p.status === 'closed') return 'ended';
    if (p.vote_end && new Date(p.vote_end) <= now) return 'ended';
    if (p.vote_start && new Date(p.vote_start) > now) return 'scheduled';
    if (p.vote_start && new Date(p.vote_start) <= now && (!p.vote_end || new Date(p.vote_end) > now)) return 'voting';
    if (!p.vote_start && p.vote_end && new Date(p.vote_end) > now) return 'voting';
    return 'open';
  }

  async function init() {
    const user = await fetchCurrentUser();
    if (['approved','officer','admin'].includes(user.status)) {
      document.getElementById('new-btn').style.display = 'inline-flex';
    }
    const res = await fetch('/api/proposals');
    allProposals = await res.json();
    renderList();
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function renderList() {
    const container = document.getElementById('list-container');
    const filtered = currentFilter === 'all'
      ? allProposals
      : allProposals.filter(p => getState(p) === currentFilter);

    if (filtered.length === 0) {
      container.innerHTML = `<div style="text-align:center;padding:48px 0;color:#9ca3af;font-size:14px;">該当する議題がありません</div>`;
      return;
    }

    container.innerHTML = filtered.map(p => {
      const state = getState(p);
      const color = STATE_COLOR[state];
      const bg    = STATE_BG[state];
      const label = STATE_LABEL[state];

      const total = (p.agree_count || 0) + (p.disagree_count || 0);
      const agreeRatio = total > 0 ? Math.round((p.agree_count / total) * 100) : 0;
      const voteBar = total > 0 ? `
        <div class="vote-bar-wrap">
          <div class="vote-bar-track">
            <div class="vote-bar-fill" style="width:${agreeRatio}%;background:${color};"></div>
          </div>
          <div class="vote-counts">
            <span>👍 ${p.agree_count} 賛成</span>
            <span>👎 ${p.disagree_count} 反対</span>
          </div>
        </div>` : '';

      const periodText = p.vote_end
        ? `〜 ${new Date(p.vote_end).toLocaleDateString('ja-JP', {month:'numeric',day:'numeric'})}`
        : '';

      return `
        <a class="proposal-card" href="/pages/proposal-detail?id=${p.id}">
          <div class="proposal-bar" style="background:${color};"></div>
          <div class="proposal-body" style="background:${bg};">
            <span class="status-badge" style="background:${color}20;color:${color};">${label}</span>
            <div class="proposal-title">${escHtml(p.title)}</div>
            ${voteBar}
            <div class="proposal-meta">
              <span>👤 ${escHtml(p.user_name||'')}</span>
              <span>💬 ${p.comment_count}</span>
              ${periodText ? `<span>⏰ ${periodText}</span>` : ''}
              <span>🕐 ${formatDate(p.created_at)}</span>
            </div>
          </div>
        </a>`;
    }).join('');
  }

  function escHtml(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
</body>
</html>
