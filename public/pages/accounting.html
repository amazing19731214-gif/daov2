<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>会計報告書 - 自治会DAO</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .acc-table { width:100%; border-collapse:collapse; font-size:13px; }
  .acc-table th { background:#f3f4f6; padding:8px 10px; text-align:left; font-size:12px; color:#6b7280; font-weight:600; }
  .acc-table td { padding:10px; border-bottom:1px solid #f3f4f6; }
  .acc-table tr:last-child td { border-bottom:none; }
  .income-row td { background:#f0fdf4; }
  .expense-row td { background:#fff7f7; }
  .total-row td { font-weight:700; background:#f9fafb; border-top:2px solid #e5e7eb; }
  .type-tag { display:inline-block; padding:2px 8px; border-radius:99px; font-size:11px; font-weight:700; }
  .tag-income { background:#dcfce7; color:#16a34a; }
  .tag-expense { background:#fee2e2; color:#dc2626; }
</style>
</head>
<body>

<div class="header">
  <a href="/" class="back-btn">←</a>
  <h1>💰 会計報告書</h1>
</div>

<div id="page-body" style="padding-bottom:80px;">
  <div class="loading" style="padding:40px;text-align:center;">読み込み中…</div>
</div>

<nav class="tab-bar">
  <a class="tab-item" href="/"><span class="icon">🏠</span>お知らせ</a>
  <a class="tab-item" href="/pages/map"><span class="icon">🗺️</span>地図</a>
  <a class="tab-item" href="/pages/proposals"><span class="icon">📋</span>議題</a>
  <a class="tab-item" href="/pages/post"><span class="icon">✏️</span>投稿</a>
  <a class="tab-item" href="/pages/schedule"><span class="icon">📅</span>予定</a>
  <a class="tab-item" href="/pages/mypage"><span class="icon">👤</span>My</a>
</nav>

<div id="toast" class="toast"></div>
<script src="/js/common.js"></script>
<script>
  let _reports = [];
  let _user = null;
  let _canEdit = false;
  let _currentReport = null;
  let _currentItems = [];

  function escHtml(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
  }

  function fmtYen(n) {
    return Number(n||0).toLocaleString() + '円';
  }

  async function init() {
    _user = await fetchCurrentUser().catch(() => null);
    _canEdit = _user && ['admin','officer'].includes(_user.status);

    const res = await fetch('/api/accounting/reports');
    _reports = await res.json();
    renderList();
  }

  function renderList() {
    let html = '<div style="padding:12px 16px 0;">';

    if (_canEdit) {
      html += `<button class="btn btn-primary btn-sm" style="margin-bottom:8px;" onclick="addReport()">＋ 年度を追加</button>`;
    }

    html += '</div>';

    if (_reports.length === 0) {
      html += `<div style="text-align:center;padding:60px 0;color:#9ca3af;">
        <div style="font-size:40px;margin-bottom:8px;">📒</div>
        <div>会計報告書がありません</div>
      </div>`;
    } else {
      _reports.forEach(r => {
        html += `
          <div class="card" style="margin:4px 16px;cursor:pointer;" onclick="openReport(${r.id})">
            <div style="display:flex;align-items:center;gap:10px;">
              <div style="font-size:28px;">📒</div>
              <div style="flex:1;min-width:0;">
                <div style="font-weight:700;font-size:16px;">${r.fiscal_year}年度</div>
                <div style="font-size:13px;color:#374151;margin-top:2px;">${escHtml(r.title)}</div>
                ${r.description ? `<div style="font-size:12px;color:#9ca3af;">${escHtml(r.description)}</div>` : ''}
              </div>
              <div style="color:#9ca3af;font-size:20px;">›</div>
            </div>
          </div>`;
      });
    }

    document.getElementById('page-body').innerHTML = html;
  }

  async function openReport(id) {
    const res = await fetch(`/api/accounting/reports/${id}`);
    const data = await res.json();
    _currentReport = data.report;
    _currentItems = data.items;
    renderDetail();
  }

  function renderDetail() {
    const r = _currentReport;
    const items = _currentItems;

    const income  = items.filter(i => i.type === 'income');
    const expense = items.filter(i => i.type === 'expense');
    const totalIn  = income.reduce((s, i) => s + Number(i.amount), 0);
    const totalOut = expense.reduce((s, i) => s + Number(i.amount), 0);
    const balance  = totalIn - totalOut;

    function tableRows(list) {
      if (list.length === 0) return `<tr><td colspan="3" style="text-align:center;color:#9ca3af;padding:16px;">データなし</td></tr>`;
      return list.map(it => `
        <tr>
          <td>
            <div style="font-weight:600;">${escHtml(it.item_name)}</div>
            ${it.notes ? `<div style="font-size:11px;color:#9ca3af;">${escHtml(it.notes)}</div>` : ''}
          </td>
          <td style="font-size:11px;color:#6b7280;">${escHtml(it.category)}</td>
          <td style="text-align:right;font-weight:600;">${fmtYen(it.amount)}</td>
          ${_canEdit ? `
            <td style="white-space:nowrap;">
              <button class="btn btn-secondary btn-sm" style="padding:3px 7px;font-size:11px;" onclick="editItem(${it.id})">✏️</button>
              <button class="btn btn-danger btn-sm" style="padding:3px 7px;font-size:11px;" onclick="deleteItem(${it.id},'${escHtml(it.item_name)}')">🗑</button>
            </td>` : ''}
        </tr>`).join('');
    }

    let html = `
      <div style="padding:12px 16px 0;">
        <button class="btn btn-secondary btn-sm" onclick="init()">← 一覧へ戻る</button>
      </div>
      <div class="card" style="margin:8px 16px;background:#eff6ff;border-color:#bfdbfe;">
        <div style="font-size:20px;font-weight:800;">${r.fiscal_year}年度 ${escHtml(r.title)}</div>
        ${r.description ? `<div style="font-size:13px;color:#374151;margin-top:4px;">${escHtml(r.description)}</div>` : ''}
      </div>

      <!-- サマリー -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px 8px;">
        <div class="card" style="text-align:center;padding:12px 8px;background:#f0fdf4;border-color:#bbf7d0;">
          <div style="font-size:11px;color:#16a34a;font-weight:600;">収入合計</div>
          <div style="font-size:16px;font-weight:800;color:#16a34a;">${fmtYen(totalIn)}</div>
        </div>
        <div class="card" style="text-align:center;padding:12px 8px;background:#fff7f7;border-color:#fecaca;">
          <div style="font-size:11px;color:#dc2626;font-weight:600;">支出合計</div>
          <div style="font-size:16px;font-weight:800;color:#dc2626;">${fmtYen(totalOut)}</div>
        </div>
        <div class="card" style="text-align:center;padding:12px 8px;background:${balance>=0?'#eff6ff':'#fff7f7'};border-color:${balance>=0?'#bfdbfe':'#fecaca'};">
          <div style="font-size:11px;color:${balance>=0?'#2563eb':'#dc2626'};font-weight:600;">差引残高</div>
          <div style="font-size:16px;font-weight:800;color:${balance>=0?'#2563eb':'#dc2626'};">${fmtYen(balance)}</div>
        </div>
      </div>

      <!-- 収入明細 -->
      <div style="padding:12px 16px 4px;display:flex;align-items:center;justify-content:space-between;">
        <div style="font-weight:700;color:#16a34a;">📥 収入明細</div>
        ${_canEdit ? `<button class="btn btn-sm" style="background:#dcfce7;color:#16a34a;border:none;" onclick="addItem('income')">＋ 追加</button>` : ''}
      </div>
      <div style="overflow-x:auto;padding:0 16px;">
        <table class="acc-table">
          <thead><tr>
            <th>項目</th><th>分類</th><th style="text-align:right;">金額</th>
            ${_canEdit ? '<th></th>' : ''}
          </tr></thead>
          <tbody>${tableRows(income)}</tbody>
          <tfoot><tr class="total-row">
            <td colspan="2">収入合計</td>
            <td style="text-align:right;">${fmtYen(totalIn)}</td>
            ${_canEdit ? '<td></td>' : ''}
          </tr></tfoot>
        </table>
      </div>

      <!-- 支出明細 -->
      <div style="padding:16px 16px 4px;display:flex;align-items:center;justify-content:space-between;">
        <div style="font-weight:700;color:#dc2626;">📤 支出明細</div>
        ${_canEdit ? `<button class="btn btn-sm" style="background:#fee2e2;color:#dc2626;border:none;" onclick="addItem('expense')">＋ 追加</button>` : ''}
      </div>
      <div style="overflow-x:auto;padding:0 16px;">
        <table class="acc-table">
          <thead><tr>
            <th>項目</th><th>分類</th><th style="text-align:right;">金額</th>
            ${_canEdit ? '<th></th>' : ''}
          </tr></thead>
          <tbody>${tableRows(expense)}</tbody>
          <tfoot><tr class="total-row">
            <td colspan="2">支出合計</td>
            <td style="text-align:right;">${fmtYen(totalOut)}</td>
            ${_canEdit ? '<td></td>' : ''}
          </tr></tfoot>
        </table>
      </div>
      <div style="height:16px;"></div>`;

    document.getElementById('page-body').innerHTML = html;
  }

  function showModal(title, bodyHtml, onSave) {
    const existing = document.getElementById('edit-modal');
    if (existing) existing.remove();
    const modal = document.createElement('div');
    modal.id = 'edit-modal';
    modal.style.cssText = 'position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;';
    modal.innerHTML = `
      <div style="background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px 40px;">
        <div style="font-weight:700;font-size:17px;margin-bottom:16px;">${title}</div>
        ${bodyHtml}
        <div style="display:flex;gap:8px;margin-top:16px;">
          <button class="btn btn-secondary btn-block" onclick="document.getElementById('edit-modal').remove()">キャンセル</button>
          <button class="btn btn-primary btn-block" id="modal-save-btn">保存</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    document.getElementById('modal-save-btn').onclick = onSave;
  }

  function reportForm(r = {}) {
    const currentYear = new Date().getFullYear();
    return `
      <div style="display:grid;gap:10px;">
        <div>
          <label style="font-size:12px;font-weight:600;">年度 *</label>
          <input id="rf-year" class="form-input" type="number" style="margin-top:4px;" value="${r.fiscal_year||currentYear}">
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;">タイトル *</label>
          <input id="rf-title" class="form-input" style="margin-top:4px;" value="${escHtml(r.title||'収支報告書')}">
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;">説明</label>
          <input id="rf-desc" class="form-input" style="margin-top:4px;" value="${escHtml(r.description||'')}">
        </div>
      </div>`;
  }

  function addReport() {
    showModal('年度を追加', reportForm(), async () => {
      const body = {
        fiscal_year:  parseInt(document.getElementById('rf-year').value),
        title:       document.getElementById('rf-title').value.trim(),
        description: document.getElementById('rf-desc').value.trim(),
      };
      if (!body.fiscal_year || !body.title) { showToast('年度とタイトルは必須です'); return; }
      const res = await fetch('/api/accounting/reports', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('edit-modal').remove();
        showToast('追加しました');
        _reports = await (await fetch('/api/accounting/reports')).json();
        renderList();
      } else showToast(data.error);
    });
  }

  const ITEM_CATS = {
    income: ['会費収入','補助金','繰越金','寄付','その他'],
    expense: ['行事費','管理費','清掃費','防災費','広報費','人件費','備品費','その他']
  };

  function itemForm(type, it = {}) {
    const cats = ITEM_CATS[type] || ['その他'];
    const label = type === 'income' ? '収入' : '支出';
    return `
      <div style="display:grid;gap:10px;">
        <div>
          <label style="font-size:12px;font-weight:600;">分類</label>
          <select id="af-cat" class="form-select" style="margin-top:4px;">
            ${cats.map(c => `<option ${it.category===c?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;">${label}項目名 *</label>
          <input id="af-name" class="form-input" style="margin-top:4px;" value="${escHtml(it.item_name||'')}">
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;">金額（円）</label>
          <input id="af-amount" class="form-input" type="number" min="0" style="margin-top:4px;" value="${it.amount||0}">
        </div>
        <div>
          <label style="font-size:12px;font-weight:600;">備考</label>
          <input id="af-notes" class="form-input" style="margin-top:4px;" value="${escHtml(it.notes||'')}">
        </div>
      </div>`;
  }

  function addItem(type) {
    const label = type === 'income' ? '収入' : '支出';
    showModal(`${label}明細を追加`, itemForm(type), async () => {
      const body = {
        type,
        category:  document.getElementById('af-cat').value,
        item_name: document.getElementById('af-name').value.trim(),
        amount:    parseInt(document.getElementById('af-amount').value) || 0,
        notes:     document.getElementById('af-notes').value.trim(),
      };
      if (!body.item_name) { showToast('項目名は必須です'); return; }
      const res = await fetch(`/api/accounting/reports/${_currentReport.id}/items`, {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('edit-modal').remove();
        showToast('追加しました');
        await reloadDetail();
      } else showToast(data.error);
    });
  }

  function editItem(id) {
    const it = _currentItems.find(i => i.id === id);
    if (!it) return;
    const label = it.type === 'income' ? '収入' : '支出';
    showModal(`${label}明細を編集`, itemForm(it.type, it), async () => {
      const body = {
        type:      it.type,
        category:  document.getElementById('af-cat').value,
        item_name: document.getElementById('af-name').value.trim(),
        amount:    parseInt(document.getElementById('af-amount').value) || 0,
        notes:     document.getElementById('af-notes').value.trim(),
      };
      if (!body.item_name) { showToast('項目名は必須です'); return; }
      const res = await fetch(`/api/accounting/items/${id}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('edit-modal').remove();
        showToast('更新しました');
        await reloadDetail();
      } else showToast(data.error);
    });
  }

  async function deleteItem(id, name) {
    if (!confirm(`「${name}」を削除しますか？`)) return;
    const res = await fetch(`/api/accounting/items/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.success) {
      _currentItems = _currentItems.filter(i => i.id !== id);
      renderDetail();
      showToast('削除しました');
    } else showToast(data.error);
  }

  async function reloadDetail() {
    const res = await fetch(`/api/accounting/reports/${_currentReport.id}`);
    const data = await res.json();
    _currentItems = data.items;
    renderDetail();
  }

  init();
</script>
</body>
</html>
