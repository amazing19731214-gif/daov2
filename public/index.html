<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>お知らせ - 自治会DAO</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  /* カテゴリ色 */
  .notice-card {
    display: flex;
    background: #fff;
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
    border: 1px solid #f0f0f0;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
  }
  .notice-bar { width: 5px; flex-shrink: 0; }
  .notice-body { padding: 14px 14px; flex: 1; min-width: 0; }
  .notice-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.4;
    color: #111827;
  }
  .notice-meta {
    font-size: 12px;
    color: #9ca3af;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 6px;
  }
  .notice-badge {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 9px;
    border-radius: 10px;
    margin-bottom: 4px;
  }
  .notice-read-bar {
    margin-top: 8px;
    font-size: 12px;
    color: #6b7280;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .notice-read-track {
    flex: 1;
    height: 4px;
    border-radius: 99px;
    background: #f3f4f6;
    overflow: hidden;
  }
  .notice-read-fill {
    height: 100%;
    border-radius: 99px;
    background: #2563eb;
  }

  /* 緊急カード */
  .notice-card.emergency {
    border-color: #fca5a5;
  }

  /* セクション見出し */
  .section-label {
    font-size: 12px;
    font-weight: 700;
    color: #6b7280;
    letter-spacing: .05em;
    padding: 8px 0 6px;
    text-transform: uppercase;
  }

  /* 空状態 */
  .empty-state {
    text-align: center;
    padding: 56px 0;
    color: #9ca3af;
    font-size: 15px;
  }
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header">
  <h1>🏘️ 自治会DAO</h1>
  <span id="user-badge" style="font-size:13px;color:#6b7280;"></span>
</div>

<!-- 仮登録・承認待ちバナー -->
<div id="register-banner" style="display:none;background:#fef3c7;border-bottom:1px solid #fcd34d;padding:10px 16px;align-items:center;justify-content:space-between;gap:8px;">
  <span id="banner-msg" style="font-size:13px;color:#92400e;"></span>
  <a id="banner-btn" href="/pages/register" class="btn btn-sm" style="background:#f59e0b;color:#fff;white-space:nowrap;min-height:32px;padding:4px 12px;">申請する</a>
</div>

<!-- 天気ウィジェット -->
<div id="weather-widget" style="display:none;margin:10px 16px 0;background:#fff;border-radius:12px;padding:12px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid #f0f0f0;">
  <div style="font-size:11px;color:#9ca3af;margin-bottom:6px;">📍 松かげ台周辺の天気</div>
  <div id="weather-days" style="display:flex;gap:8px;"></div>
</div>

<!-- メインコンテンツ -->
<div class="page" style="padding:12px 16px 0;" id="notice-container">
  <div class="loading">読み込み中…</div>
</div>

<!-- タブバー -->
<nav class="tab-bar">
  <a class="tab-item active" href="/"><span class="icon">🏠</span>お知らせ</a>
  <a class="tab-item" href="/pages/map"><span class="icon">🗺️</span>地図</a>
  <a class="tab-item" href="/pages/proposals"><span class="icon">📋</span>議題</a>
  <a class="tab-item" href="/pages/post"><span class="icon">✏️</span>投稿</a>
  <a class="tab-item" href="/pages/schedule"><span class="icon">📅</span>予定</a>
  <a class="tab-item" href="/pages/mypage"><span class="icon">👤</span>My</a>
</nav>

<div id="toast" class="toast"></div>
<script src="/js/common.js"></script>
<script>
  // カテゴリ色定義
  const CAT_COLOR = {
    '工事':     '#2563eb',
    '注意喚起': '#dc2626',
    'イベント': '#16a34a',
    '防災':     '#ea580c',
    '一般':     '#6b7280',
    'お知らせ': '#6b7280',
  };

  function getCatColor(cat) {
    return CAT_COLOR[cat] || '#6b7280';
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function init() {
    const user = await fetchCurrentUserOptional();
    if (!user) { window.location.href = '/pages/login'; return; }

    document.getElementById('user-badge').textContent =
      (user.name || 'ゲスト') + '（' + (USER_STATUS_LABELS[user.status] || user.status) + '）';

    const banner = document.getElementById('register-banner');
    const bannerMsg = document.getElementById('banner-msg');
    const bannerBtn = document.getElementById('banner-btn');
    if (user.status === 'provisional') {
      banner.style.display = 'flex';
      bannerMsg.textContent = '📝 本登録申請をするとコメント・投票ができます';
      bannerBtn.style.display = 'inline-flex';
    } else if (user.status === 'pending_review') {
      banner.style.display = 'flex';
      bannerMsg.textContent = '⏳ 本登録申請中です。管理者の承認をお待ちください';
      bannerBtn.style.display = 'none';
    }

    if (['admin', 'officer'].includes(user.status)) {
      const adminLink = document.createElement('a');
      adminLink.href = '/pages/admin';
      adminLink.innerHTML = '⚙️ 管理';
      adminLink.style.cssText = 'font-size:13px;font-weight:600;text-decoration:none;background:#f3f4f6;border-radius:8px;padding:4px 10px;margin-left:8px;color:#374151;';
      document.querySelector('.header').appendChild(adminLink);
    }

    await loadNotices();
    loadWeather();
  }

  // WMOコード → 絵文字・説明
  function weatherIcon(code) {
    if (code === 0)                return ['☀️', '快晴'];
    if (code <= 2)                 return ['🌤️', '晴れ'];
    if (code === 3)                return ['☁️', '曇り'];
    if (code <= 48)                return ['🌫️', '霧'];
    if (code <= 55)                return ['🌦️', '霧雨'];
    if (code <= 65)                return ['🌧️', '雨'];
    if (code <= 75)                return ['🌨️', '雪'];
    if (code <= 82)                return ['🌦️', 'にわか雨'];
    if (code <= 86)                return ['🌨️', 'にわか雪'];
    if (code <= 99)                return ['⛈️', '雷雨'];
    return ['🌡️', ''];
  }

  async function loadWeather() {
    try {
      // 松かげ台（厚木市）周辺の座標
      const lat = 35.44, lng = 139.37;
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&forecast_days=3`;
      const res  = await fetch(url);
      const data = await res.json();
      const { time, weather_code, temperature_2m_max, temperature_2m_min } = data.daily;

      const days = ['今日', '明日', '明後日'];
      const html = time.map((t, i) => {
        const [icon, label] = weatherIcon(weather_code[i]);
        const max = Math.round(temperature_2m_max[i]);
        const min = Math.round(temperature_2m_min[i]);
        const dow = ['日','月','火','水','木','金','土'][new Date(t).getDay()];
        return `
          <div style="flex:1;text-align:center;padding:6px 4px;background:#f9fafb;border-radius:8px;">
            <div style="font-size:11px;font-weight:600;color:#6b7280;">${days[i]}<span style="color:#9ca3af;">（${dow}）</span></div>
            <div style="font-size:28px;line-height:1.3;">${icon}</div>
            <div style="font-size:11px;color:#6b7280;">${label}</div>
            <div style="font-size:13px;font-weight:700;margin-top:2px;">
              <span style="color:#dc2626;">${max}°</span>
              <span style="color:#3b82f6;margin-left:4px;">${min}°</span>
            </div>
          </div>`;
      }).join('');

      document.getElementById('weather-days').innerHTML = html;
      document.getElementById('weather-widget').style.display = 'block';
    } catch(e) {
      // 天気取得失敗は無視
    }
  }

  async function loadNotices() {
    const container = document.getElementById('notice-container');
    try {
      const res = await fetch('/api/notices');
      const notices = await res.json();
      renderNotices(notices, container);
    } catch(e) {
      container.innerHTML = `<div class="empty-state">お知らせの読み込みに失敗しました</div>`;
    }
  }

  function renderNotices(notices, container) {
    if (notices.length === 0) {
      container.innerHTML = `<div class="empty-state">📭 現在お知らせはありません</div>`;
      return;
    }

    const emergency = notices.filter(n => ['emergency','urgent'].includes(n.priority));
    const normal    = notices.filter(n => !['emergency','urgent'].includes(n.priority));

    let html = '';

    if (emergency.length > 0) {
      html += `<div class="section-label">🚨 緊急・重要</div>`;
      html += emergency.map(n => noticeCard(n)).join('');
    }

    if (normal.length > 0) {
      if (emergency.length > 0) {
        html += `<div class="section-label" style="margin-top:8px;">📢 お知らせ</div>`;
      }
      html += normal.map(n => noticeCard(n)).join('');
    }

    container.innerHTML = html;
  }

  function noticeCard(n) {
    const isEmergency = ['emergency','urgent'].includes(n.priority);
    const color = isEmergency ? '#dc2626' : getCatColor(n.category);
    const bg    = isEmergency ? '#fff5f5' : '#fff';

    const total = n.total_count || 0;
    const read  = n.read_count  || 0;
    const readBar = total > 0 ? (() => {
      const pct = Math.min(Math.round((read / total) * 100), 100);
      return `
        <div class="notice-read-bar">
          <span>既読 ${read}/${total}</span>
          <div class="notice-read-track">
            <div class="notice-read-fill" style="width:${pct}%;background:${color};"></div>
          </div>
          <span>${pct}%</span>
        </div>`;
    })() : '';

    const emergencyBadge = isEmergency
      ? `<span class="notice-badge" style="background:#fee2e2;color:#dc2626;">🚨 緊急</span>`
      : '';

    const myReadMark = n.myRead
      ? `<span style="color:#16a34a;font-weight:700;">✅ 既読</span>`
      : '';

    const dateStr = n.created_at ? new Date(n.created_at).toLocaleDateString('ja-JP', {month:'numeric',day:'numeric'}) : '';

    return `
      <div class="notice-card${isEmergency ? ' emergency' : ''}"
           style="background:${bg};"
           onclick="openNotice(${n.id})">
        <div class="notice-bar" style="background:${color};"></div>
        <div class="notice-body">
          ${emergencyBadge}
          <div class="notice-title">${escHtml(n.title)}</div>
          ${readBar}
          <div class="notice-meta">
            <span style="background:${color}20;color:${color};padding:1px 8px;border-radius:8px;font-weight:600;">${escHtml(n.category)}</span>
            <span>📅 ${dateStr}</span>
            ${myReadMark}
          </div>
        </div>
      </div>`;
  }

  async function openNotice(id) {
    // 既読登録
    fetch(`/api/notices/${id}/read`, { method: 'POST' }).catch(() => {});

    // 詳細取得してモーダル表示
    const res = await fetch(`/api/notices/${id}`);
    const n = await res.json();

    const color = ['emergency','urgent'].includes(n.priority) ? '#dc2626' : getCatColor(n.category);
    const dateStr = n.created_at ? new Date(n.created_at).toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric'}) : '';

    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;';
    modal.innerHTML = `
      <div style="background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:85vh;overflow-y:auto;padding:20px 16px 40px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
          <div style="width:4px;height:24px;border-radius:2px;background:${color};flex-shrink:0;"></div>
          <h2 style="font-size:18px;font-weight:700;margin:0;flex:1;line-height:1.4;">${escHtml(n.title)}</h2>
          <button onclick="this.closest('div[style*=fixed]').remove()"
            style="background:none;border:none;font-size:22px;color:#9ca3af;cursor:pointer;padding:0 4px;">✕</button>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;">
          <span style="background:${color}20;color:${color};padding:2px 10px;border-radius:10px;font-size:12px;font-weight:700;">${escHtml(n.category)}</span>
          <span style="font-size:12px;color:#9ca3af;">📅 ${dateStr}</span>
          ${n.author_name ? `<span style="font-size:12px;color:#9ca3af;">👤 ${escHtml(n.author_name)}</span>` : ''}
        </div>
        <div style="font-size:15px;line-height:1.8;color:#374151;white-space:pre-wrap;margin-bottom:16px;">${escHtml(n.content || '')}</div>
        ${n.total_count > 0 ? `<div style="font-size:13px;color:#6b7280;background:#f9fafb;padding:10px 14px;border-radius:10px;">👁 既読 ${n.read_count}/${n.total_count}人</div>` : ''}
        <button onclick="this.closest('div[style*=fixed]').remove();loadNotices();"
          style="width:100%;margin-top:16px;padding:14px;border-radius:14px;border:none;background:#2563eb;color:#fff;font-size:16px;font-weight:700;cursor:pointer;">
          ✅ 閉じる
        </button>
      </div>`;
    document.body.appendChild(modal);
  }

  init();
</script>
</body>
</html>
